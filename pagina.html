<body class="page">

<script src="script.js"></script>

<script>
function irAdviento(){

const sonido = new Audio("sounds/fc.mp3")
sonido.volume = 0.6

sonido.play()

// esperar a que termine el audio
sonido.onended = () => {
window.location.href = "adviento.html"
}

// por si falla (seguridad)
setTimeout(()=>{
window.location.href = "adviento.html"
},3000)

}
</script>
